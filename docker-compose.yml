services:
  postgres:
    image: postgres:16
    container_name: ipv-postgres
    environment:
      POSTGRES_DB: ipv_explain_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ipv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ipv_explain_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ipv_pgdata:
